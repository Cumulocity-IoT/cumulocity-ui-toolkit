<div class="map-marker" style="min-width: 10rem;">
  <a
    class="deviceLink text-14"
    [href]="mo?.c8y_IsDeviceGroup ? ('#/group/' + mo?.id): ('#/device/' + mo?.id)"
    title="{{ mo?.name }}"
    >
    {{ mo?.name }}
  </a>
  @if (cfg.showDate && (lastUpdated || mo)) {
    <div class="text-muted m-t-4 m-b-4">
      <i c8yIcon="clock-o"></i>
      {{ "Last update" | translate }}:<br />{{ (lastUpdated ? lastUpdated : mo?.lastUpdated) | c8yDate }}
    </div>
  }
  @if (cfg.showAlarms) {
    <alarm-display [mo]="mo"></alarm-display>
  }

  <div class="form-group form-inline">
    @for (a of cfg.actions; track a) {
      <button
        class="btn btn-default btn-xs"
        (click)="sendAction(a, mo)">
        <i c8yIcon="{{a | actionIcon}}"></i>
        {{ a.label }}
      </button>
    }
  </div>
</div>
