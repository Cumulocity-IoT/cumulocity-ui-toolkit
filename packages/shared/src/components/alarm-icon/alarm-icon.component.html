@if (severity && display === 'severity') {
  @switch (severity) {
    @case ('CRITICAL') {
      <i c8yIcon="warning" class="status critical" container="body" [tooltip]="'CRITICAL' | translate" [placement]="placement"></i>
    }
    @case ('MAJOR') {
      <i c8yIcon="exclamation-circle" class="status major" container="body" [tooltip]="'MAJOR' | translate" [placement]="placement"></i>
    }
    @case ('MINOR') {
      <i c8yIcon="exclamation-circle" class="status minor" container="body" [tooltip]="'MINOR' | translate" [placement]="placement"></i>
    }
    @case ('WARNING') {
      <i c8yIcon="circle" class="status warning" container="body" [tooltip]="'WARNING' | translate" [placement]="placement"></i>
    }
  }
}

@if (status && display === 'status') {
  @switch (status) {
    @case ('ACTIVE') {
      <i c8yIcon="bell" class="status active" container="body" [tooltip]="'ACTIVE' | translate" [placement]="placement"> </i>
    }
    @case ('ACKNOWLEDGED') {
      <i c8yIcon="bell-slash" class="status acknowledged" container="body" [tooltip]="'ACKNOWLEDGED' | translate" [placement]="placement"> </i>
    }
    @case ('CLEARED') {
      <i c8yIcon="check-circle" class="text-muted" container="body" [tooltip]="'CLEARED' | translate" [placement]="placement"> </i>
    }
  }
}
