<ng-container>
  <carousel
    [interval]="interval"
    [noPause]="noPause"
    [noWrap]="noWrap"
    [showIndicators]="showIndicators"
    [pauseOnFocus]="pauseOnFocus"
    >
    @for (image of gallery.images; track image) {
      <slide>
        <img [src]="image" class="fit-h fit-w" style="object-fit: contain; object-position: center center;"/>
      </slide>
    }
  </carousel>
</ng-container>
